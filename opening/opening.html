<section class="srn-opening" data-srn-opening aria-label="Opening cover">
  <div class="srn-opening__media" data-srn-opening-media aria-hidden="true"></div>
  <div class="srn-opening__veil" aria-hidden="true"></div>
  <div class="srn-opening__content">
    <p class="srn-opening__kicker" data-split>Undangan Pernikahan</p>
    <h1 class="srn-opening__names" data-srn-opening-names data-split>{{bride_name}} &amp; {{groom_name}}</h1>
    <p class="srn-opening__guest" data-split>Kepada Yth. {{guest_name}}</p>
    <button class="srn-opening__button" type="button" data-srn-open-invitation>
      <span>Buka Undangan</span>
      <i aria-hidden="true"></i>
    </button>
  </div>
</section>
